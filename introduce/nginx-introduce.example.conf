# StudySolo introduce (Vite SPA) — example Nginx fragment
# Paste into server block or include; adjust filesystem path to match production.
#
# Root cause patterns this avoids:
# - C-01: location /introduce/ and alias must both end with / (or both without) consistently.
# - C-09: alias must point at the directory that CONTAINS index.html + assets/ (i.e. dist/).
# - Stale index.html cached with old ?hash? while only new JS exists → 404 + white screen:
#   never long-cache HTML; long-cache only hashed files under assets/.

# 1) Hashed bundles: safe to cache forever
location ^~ /introduce/assets/ {
    alias /www/wwwroot/studyflow.1037solo.com/introduce/dist/assets/;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# 2) Other static files under introduce (images, StudySolo.png, etc.)
location ^~ /introduce/ {
    alias /www/wwwroot/studyflow.1037solo.com/introduce/dist/;
    try_files $uri $uri/ /introduce/index.html;
    # Do NOT set expires 7d on the whole block — it caches index.html and breaks after redeploys.
    add_header Cache-Control "no-cache";
}

# Optional: stricter entry document (if your Nginx version supports nested alias cleanly,
# duplicate the alias path or use a map). Many teams rely on block (2) alone with no-cache.
